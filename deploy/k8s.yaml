apiVersion: apps/v1
kind: Deployment
metadata: { name: introbot, labels: { app: introbot } }
spec:
  replicas: 1
  selector: { matchLabels: { app: introbot } }
  template:
    metadata: { labels: { app: introbot } }
    spec:
      containers:
        - name: introbot
          image: ghcr.io/cognis-digital/introbot:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: introbot }
spec:
  selector: { app: introbot }
  ports: [{ port: 80, targetPort: 8000 }]
